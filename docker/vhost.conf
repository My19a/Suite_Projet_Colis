<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # Rend les variables d'environnement du conteneur visibles cote PHP
    PassEnv APP_ENV APP_BASE_URL
    PassEnv DB_HOST DB_PORT DB_NAME DB_USER DB_PASSWORD
    PassEnv CAS_HOST CAS_CONTEXT CAS_PORT CAS_CA_CERT ADMIN_UIDS
    PassEnv MAIL_HOST MAIL_PORT MAIL_USERNAME MAIL_PASSWORD MAIL_FROM MAIL_FROM_NAME

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
